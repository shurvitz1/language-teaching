<script>
/* ---------- State ---------- */
const STORE_KEY = "deutschreise_v1";
const defaultState = { completed:{}, scores:{}, milestones:{}, flashKnown:{}, lastView:"dashboard" };
let state = loadState();

function loadState(){
  try{ return Object.assign({}, defaultState, JSON.parse(localStorage.getItem(STORE_KEY))||{}); }
  catch(e){ return {...defaultState}; }
}
function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

/* ---------- Lesson / milestone gating ---------- */
function lessonUnlocked(id){
  if(id===1) return true;
  // a milestone gate sits after lesson 5, 10, ...
  const gateBefore = id-1;
  if(gateBefore % 5 === 0){ // need milestone passed for the previous block
    const block = gateBefore/5;
    if(!state.milestones["m"+block]) return false;
  }
  return !!state.completed[id-1] || id<= (Math.max(...Object.keys(state.completed).map(Number).concat(0))+1);
}
function isPlaceholder(id){ return !!(LESSONS.find(l=>l.id===id)||{}).placeholder; }

/* ---------- Text to Speech ---------- */
let deVoice = null;
function pickVoice(){
  const voices = speechSynthesis.getVoices();
  deVoice = voices.find(v=>/de(-|_)?/i.test(v.lang)) || null;
}
if('speechSynthesis' in window){
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}
function speak(text, rate=0.92){
  if(!('speechSynthesis' in window)){ return; }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text.replace(/_/g,' '));
  u.lang = "de-DE"; u.rate = rate; u.pitch = 1;
  if(deVoice) u.voice = deVoice;
  speechSynthesis.speak(u);
}
function speakBtn(text){
  const t = text.replace(/'/g,"\\'").replace(/"/g,'&quot;');
  return `<button class="speak-btn shrink-0 w-9 h-9 grid place-items-center rounded-full border border-[var(--line)] bg-white hover:bg-[var(--honey)] hover:text-white transition" onclick="speak('${t}')" title="Listen">🔊</button>`;
}

/* ---------- Routing ---------- */
function go(view){ state.lastView=view; save(); render(); document.getElementById('main').scrollTo(0,0); window.scrollTo(0,0); closeMobile(); }

function render(){
  renderNav();
  const v = state.lastView || "dashboard";
  const main = document.getElementById('main');
  if(v==="dashboard") main.innerHTML = viewDashboard();
  else if(v==="progress") main.innerHTML = viewProgress();
  else if(v.startsWith("lesson:")) { renderLesson(parseInt(v.split(":")[1])); return; }
  else if(v.startsWith("homework:")) { renderHomework(parseInt(v.split(":")[1])); return; }
  else if(v.startsWith("milestone:")) { renderMilestone(parseInt(v.split(":")[1])); return; }
  else main.innerHTML = viewDashboard();
}

/* ---------- Navigation sidebar ---------- */
function renderNav(){
  const items = [
    {label:"Dashboard", icon:"◆", view:"dashboard"},
    {label:"Current Lesson", icon:"▸", view:"lesson:"+currentLessonId()},
    {label:"Homework", icon:"✎", view:"homework:"+currentLessonId()},
    {label:"Progress Tracker", icon:"▲", view:"progress"},
  ];

/* ----- Vocabulary: flashcards ----- */
function vocabModule(l){

}
function flashcard(w, lid, i){
  const key = lid+":"+w.de;
  const known = state.flashKnown[key];
  const t = w.de.replace(/'/g,"\\'");
  return `<div class="flip ${''}" data-key="${key}">
    <div class="flip-inner relative h-28">
      <div class="flip-face card rounded-xl h-full w-full p-3 flex flex-col justify-between cursor-pointer" onclick="this.closest('.flip').classList.toggle('flipped')">

        <span class="text-base font-medium">${w.en}</span>

function toggleKnown(key,btn){

function initFlashcards(){}

/* ----- Grammar ----- */
function grammarModule(l){
  const g=l.grammar;
  const blocks = g.blocks.map(b=>{
    let inner = b.p?`<p class="text-[var(--ink-soft)] mb-3">${b.p}</p>`:"";
    if(b.table){ inner += conjTable(b.table[0], b.table[1]); }
    if(b.examples){ inner += `<div class="space-y-2 mt-2">${b.examples.map(ex=>exLine(ex)).join("")}</div>`; }
    return `<div class="mb-5"><h4 class="font-display font-bold text-lg mb-2">${b.h}</h4>${inner}</div>`;
  }).join("");
  return `<h3 class="font-display font-semibold text-xl mb-4" style="color:var(--${l.accent})">${g.heading}</h3>
    ${blocks}
    <div class="mt-6 pt-5 border-t border-[var(--line)]">
      <h4 class="font-display font-bold text-lg mb-3">Practice (${g.exercises.length})</h4>
      ${quizBlock(g.exercises, "g"+l.id)}
    </div>`;
}
function conjTable(name, v){
  const rows = [["ich",v.ich],["du",v.du],["er/sie/es",v.er],["wir",v.wir],["ihr",v.ihr],["sie/Sie",v.sie]];
  return `<div class="rounded-xl overflow-hidden border border-[var(--line)] my-2">
    <div class="flex items-center justify-between px-4 py-2 text-white" style="background:var(--ink)">
      <span class="font-display font-bold">${name} <span class="opacity-70 font-sans font-normal text-sm">— ${v.en}</span></span>
      ${speakBtn(name)}
    </div>
    <div class="grid grid-cols-2 sm:grid-cols-3 gap-px bg-[var(--line)]">
      ${rows.map(r=>`<div class="bg-white px-4 py-2 flex items-center justify-between gap-2">
        <span class="text-[var(--ink-soft)] text-sm">${r[0]}</span>
        <span class="font-medium flex items-center gap-1">${r[1]} ${speakBtn(r[1])}</span>
      </div>`).join("")}
    </div>
  </div>`;
}
function exLine(ex){
  const t = ex.de.replace(/'/g,"\\'");
  return `<div class="flex items-center gap-3 bg-white rounded-lg px-3 py-2 border border-[var(--line)]">
    ${speakBtn(t)}
    <div><span class="font-medium">${ex.de}</span> <span class="text-[var(--ink-soft)] text-sm">— ${ex.en}</span></div>
  </div>`;
}

/* ----- Listening & Speaking ----- */
function listeningModule(l){
  const d=l.listening;
  const dialogue = d.dialogue.map(line=>{
    const t=line.de.replace(/'/g,"\\'");
    return `<div class="flex items-start gap-3 mb-2">
      ${speakBtn(t)}
      <div class="flex-1">
        <span class="text-xs uppercase tracking-wider text-[var(--ink-soft)]">${line.sp}</span>
        <p class="font-medium">${line.de}</p>
        <details class="text-sm text-[var(--ink-soft)]"><summary class="hover:text-ink">show translation</summary>${line.en}</details>
      </div>
    </div>`;
  }).join("");
  const shadow = d.shadow.map(s=>{
    const t=s.de.replace(/'/g,"\\'");
    return `<div class="flex items-center gap-3 bg-white rounded-lg px-3 py-2 border border-[var(--line)] mb-2">
      ${speakBtn(t)}
      <div class="flex-1"><span class="font-medium">${s.de}</span><div class="text-xs text-[var(--ink-soft)]">${s.hint}</div></div>
      <span class="text-lg">🎤</span>
    </div>`;
  }).join("");
  return `<p class="text-[var(--ink-soft)] mb-3">${d.intro}</p>
    <div class="rounded-xl p-4 mb-5" style="background:var(--paper-2)">
      <div class="flex items-center justify-between mb-3">
        <h4 class="font-display font-bold">Dialogue</h4>
        <button onclick="playDialogue(${l.id})" class="text-sm px-3 py-1.5 rounded-full text-white" style="background:var(--${l.accent})">▶ Play all</button>
      </div>
      ${dialogue}
    </div>
    <h4 class="font-display font-bold mb-2">🗣️ Shadowing — say these out loud</h4>
    ${shadow}`;
}
function playDialogue(id){
  const l=LESSONS.find(x=>x.id===id);
  const lines=l.listening.dialogue.map(d=>d.de);
  let i=0;
  speechSynthesis.cancel();
  (function next(){
    if(i>=lines.length) return;
    const u=new SpeechSynthesisUtterance(lines[i]); u.lang="de-DE"; u.rate=0.9;
    if(deVoice)u.voice=deVoice;
    u.onend=()=>{ i++; setTimeout(next,350); };
    speechSynthesis.speak(u);
  })();
}

function writingBox(key){

/* ---------- QUIZ ENGINE (MC + fill) ---------- */
function quizBlock(items, ns){
  return `<div class="space-y-4" data-quiz="${ns}">
    ${items.map((it,i)=>quizItem(it,ns,i)).join("")}
  </div>`;
}
function quizItem(it, ns, i){
  const id = ns+"_"+i;
  if(it.type==="write"){
    return `<div class="bg-white rounded-xl border border-[var(--line)] p-4">
      <p class="font-medium mb-2">${i+1}. ${it.q}</p>${writingBox(id)}</div>`;
  }
  if(it.type==="fill"){
    return `<div class="bg-white rounded-xl border border-[var(--line)] p-4" data-ans="${it.answer.toLowerCase()}" data-type="fill" id="${id}">
      <p class="font-medium mb-3">${i+1}. ${it.q}</p>
      <div class="flex items-center gap-3 flex-wrap">
        <input class="blank-input ring-honey py-1 px-2 font-medium" placeholder="…" onkeydown="if(event.key==='Enter')checkFill('${id}')"/>
        <button onclick="checkFill('${id}')" class="text-sm px-3 py-1.5 rounded-full text-white" style="background:var(--ink)">Check</button>
        <span class="feedback text-sm font-medium"></span>
      </div>
    </div>`;
  }
  // multiple choice
  return `<div class="bg-white rounded-xl border border-[var(--line)] p-4" data-ans="${it.answer}" data-type="mc" id="${id}">
    <p class="font-medium mb-3">${i+1}. ${it.q}</p>
    <div class="space-y-2">
      ${it.options.map((o,oi)=>`<button class="opt w-full text-left px-4 py-2.5 rounded-lg border border-[var(--line)]" onclick="checkMC('${id}',${oi})">${o}</button>`).join("")}
    </div>
    <div class="feedback text-sm font-medium mt-2"></div>
  </div>`;
}
function checkMC(id, choice){
  const box=document.getElementById(id);
  if(box.dataset.done) return;
  const ans=parseInt(box.dataset.ans);
  const btns=box.querySelectorAll('.opt');
  btns.forEach((b,i)=>{ b.disabled=true; if(i===ans)b.classList.add('correct'); });
  if(choice===ans){ box.querySelector('.feedback').innerHTML='<span style="color:var(--moss)">✓ Richtig!</span>'; }
  else { btns[choice].classList.add('wrong'); box.querySelector('.feedback').innerHTML='<span style="color:var(--rost)">✗ Not quite — the green one is correct.</span>'; }
  box.dataset.done=1; box.dataset.correct = (choice===ans)?1:0;
  updateMilestoneScore();
}
function checkFill(id){
  const box=document.getElementById(id);
  const input=box.querySelector('input');
  const val=input.value.trim().toLowerCase();
  const ans=box.dataset.ans;
  const ok = val===ans || val.replace(/ß/g,'ss')===ans.replace(/ß/g,'ss');
  const fb=box.querySelector('.feedback');
  if(ok){ fb.innerHTML='<span style="color:var(--moss)">✓ Richtig!</span>'; input.style.borderBottomColor='var(--moss)'; }
  else { fb.innerHTML=`<span style="color:var(--rost)">✗ Answer: <b>${box.dataset.ans}</b></span>`; input.style.borderBottomColor='var(--rost)'; }
  box.dataset.done=1; box.dataset.correct=ok?1:0;
  updateMilestoneScore();
}

/* ---------- MILESTONE TEST ---------- */
function buildMilestone(block){
  // gather exercises from the lessons in this block (1-5 for block 1)
  const from = (block-1)*5+1, to=block*5;
  let pool=[];
  LESSONS.filter(l=>l.id>=from&&l.id<=to&&!l.placeholder).forEach(l=>{
    pool=pool.concat(l.grammar.exercises.filter(e=>e.type!=="write"));
    pool=pool.concat(l.reading.questions);
    pool=pool.concat(l.homework.filter(e=>e.type!=="write"));
  });
  return pool;
}
function renderMilestone(block){
  const main=document.getElementById('main');
  const items=buildMilestone(block);
  const passed=state.milestones["m"+block];
  main.innerHTML=`
   <button onclick="go('dashboard')" class="text-sm text-[var(--ink-soft)] hover:text-ink mb-5">← Back to dashboard</button>
   <header class="rise mb-6">
     <div class="text-xs uppercase tracking-[.25em] mb-2" style="color:var(--rost)">Milestone ${block}</div>
     <h1 class="font-display font-black text-4xl">Milestone Test</h1>
     <p class="text-[var(--ink-soft)] text-lg">Covers lessons ${(block-1)*5+1}–${block*5}. Score <b>${PASS_SCORE*100}%</b> or higher to unlock the next block.</p>
     ${passed?`<p class="mt-2 font-medium" style="color:var(--moss)">★ Already passed — ${Math.round(state.scores['m'+block]*100)}%. You can retake it any time.</p>`:''}
   </header>
   <section class="card rounded-2xl p-6 rise">
     <div id="msScore" class="sticky top-2 z-10 mb-4 flex items-center justify-between bg-white rounded-xl border border-[var(--line)] px-4 py-3">
       <span class="font-medium">Progress: <span id="msAnswered">0</span>/${items.length} answered</span>
       <span class="font-display font-bold text-lg" id="msPct">—</span>
     </div>
     ${quizBlock(items, "m"+block)}
     <div class="mt-6 pt-5 border-t border-[var(--line)] text-center">
       <button onclick="gradeMilestone(${block},${items.length})" class="px-6 py-3 rounded-full font-bold text-white" style="background:var(--rost)">Submit Test</button>
       <div id="msResult" class="mt-4"></div>
     </div>
   </section>`;
  window._msTotal=items.length; window._msBlock=block;
}
function updateMilestoneScore(){
  if(!window._msTotal) return;
  const ns="m"+window._msBlock;
  const boxes=document.querySelectorAll(`[data-quiz="${ns}"] [data-type]`);
  let done=0;
  boxes.forEach(b=>{ if(b.dataset.done) done++; });
  const a=document.getElementById('msAnswered'); if(a) a.textContent=done;
}
function gradeMilestone(block, total){
  const ns="m"+block;
  const boxes=document.querySelectorAll(`[data-quiz="${ns}"] [data-type]`);
  let correct=0, answered=0;
  boxes.forEach(b=>{ if(b.dataset.done){answered++; if(b.dataset.correct==1)correct++;} });
  if(answered<total){
    if(!confirm(`You answered ${answered}/${total}. Unanswered count as wrong. Submit anyway?`)) return;
  }
  const score=correct/total;
  const res=document.getElementById('msResult');
  if(score>=PASS_SCORE){
    state.milestones[ns]=true; state.scores[ns]=score; save();
    res.innerHTML=`<div class="pop card rounded-xl p-5" style="border-color:var(--moss)">
      <div class="text-4xl mb-1">🏆</div>
      <div class="font-display font-black text-2xl" style="color:var(--moss)">Passed — ${Math.round(score*100)}%</div>
      <p class="text-[var(--ink-soft)]">${correct}/${total} correct. The next block is unlocked!</p>
      <button onclick="go('dashboard')" class="mt-3 px-5 py-2 rounded-full text-white" style="background:var(--moss)">Continue →</button>
    </div>`;
  } else {
    state.scores[ns]=score; save();
    res.innerHTML=`<div class="pop card rounded-xl p-5" style="border-color:var(--rost)">
      <div class="text-4xl mb-1">📚</div>
      <div class="font-display font-black text-2xl" style="color:var(--rost)">${Math.round(score*100)}% — not yet</div>
      <p class="text-[var(--ink-soft)]">${correct}/${total} correct. You need ${PASS_SCORE*100}%. Review the lessons and try again.</p>
      <button onclick="renderMilestone(${block})" class="mt-3 px-5 py-2 rounded-full text-white" style="background:var(--rost)">Retake test</button>
    </div>`;
  }
  document.getElementById('msPct').textContent=Math.round(score*100)+"%";
  res.scrollIntoView({behavior:"smooth",block:"center"});
}

/* ---------- PROGRESS TRACKER ---------- */
function viewProgress(){
  const total=LESSONS.filter(l=>!l.placeholder).length + LESSONS.filter(l=>l.placeholder).length;
  const done=Object.keys(state.completed).length;
  const known=Object.values(state.flashKnown).filter(Boolean).length;
  const totalWords=LESSONS.filter(l=>l.vocab).reduce((a,l)=>a+l.vocab.length,0);
  const rows=LESSONS.map(l=>{
    const c=!!state.completed[l.id];
    const u=lessonUnlocked(l.id);
    return `<div class="flex items-center gap-3 py-3 border-b border-[var(--line)]">
      <div class="w-9 h-9 rounded-lg grid place-items-center text-white font-display font-bold" style="background:var(--${l.accent})">${l.id}</div>
      <div class="flex-1 min-w-0">
        <div class="font-medium truncate">${l.title}</div>
        <div class="text-xs text-[var(--ink-soft)] truncate">${l.subtitle}</div>
      </div>
      <span>${c?'✅':u?(l.placeholder?'⏳':'▢'):'🔒'}</span>
    </div>`;
  }).join("");
  const milestones=Object.keys(state.milestones).map(k=>{
    const b=k.replace('m','');
    return `<div class="flex items-center justify-between py-2"><span>Milestone ${b}</span><span class="font-bold" style="color:var(--moss)">★ ${Math.round((state.scores[k]||0)*100)}%</span></div>`;
  }).join("") || `<p class="text-[var(--ink-soft)] text-sm">No milestones passed yet.</p>`;

  return `
  <header class="rise mb-8">
    <p class="uppercase tracking-[.3em] text-xs text-[var(--ink-soft)] mb-2">Fortschritt</p>
    <h1 class="font-display font-black text-4xl">Progress Tracker</h1>
  </header>
  <div class="grid grid-cols-2 sm:grid-cols-3 gap-4 mb-8">
    ${statBox(done+"/"+LESSONS.length,"Lessons completed","honey")}
    ${statBox(known+"/"+totalWords,"Words marked known","moss")}
    ${statBox(Object.keys(state.milestones).length,"Milestones passed","rost")}
  </div>
  <div class="card rounded-2xl p-6 mb-6 rise">
    <h2 class="font-display font-bold text-2xl mb-3">Lessons</h2>
    ${rows}
  </div>
  <div class="card rounded-2xl p-6 rise">
    <h2 class="font-display font-bold text-2xl mb-3">Milestones</h2>
    ${milestones}
  </div>`;
}

/* ---------- Misc UI ---------- */
function placeholderView(l){
  return `<button onclick="go('dashboard')" class="text-sm text-[var(--ink-soft)] hover:text-ink mb-5">← Back</button>
  <div class="card rounded-2xl p-10 text-center rise">
    <div class="text-5xl mb-3">🛠️</div>
    <h1 class="font-display font-black text-3xl mb-2">Lesson ${l.id}: ${l.title}</h1>
    <p class="text-[var(--ink-soft)] max-w-md mx-auto">${l.subtitle}. This lesson is part of the roadmap and will follow the same 90-minute structure as lessons 1 &amp; 2.</p>
  </div>`;
}
function lockedNotice(id){
  return `<button onclick="go('dashboard')" class="text-sm text-[var(--ink-soft)] hover:text-ink mb-5">← Back</button>
  <div class="card rounded-2xl p-10 text-center rise">
    <div class="text-5xl mb-3">🔒</div>
    <h1 class="font-display font-black text-3xl mb-2">Locked</h1>
    <p class="text-[var(--ink-soft)]">Complete the earlier lessons and pass the milestone test to unlock lesson ${id}.</p>
  </div>`;
}
function toast(msg){
  const t=document.createElement('div');
  t.className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[60] px-5 py-3 rounded-full text-white font-medium pop";
  t.style.background="var(--ink)"; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.transition="opacity .4s"; t.style.opacity="0"; setTimeout(()=>t.remove(),400); },2200);
}
function resetAll(){
  if(confirm("Reset ALL progress? This cannot be undone.")){
    localStorage.removeItem(STORE_KEY); state={...defaultState}; go("dashboard");
  }
}
function toggleMobileNav(){ const n=document.getElementById('mobileNav'); n.classList.toggle('hidden'); }
function closeMobile(){ document.getElementById('mobileNav').classList.add('hidden'); }

/* ---------- Boot ---------- */
render();
</script>
</body>
</html>
